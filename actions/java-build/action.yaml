name: "Greeting Action"

description: "Receives name andreturns message"

inputs:
 username:
  required: true
  description: "User name"


outputs:
 message:
  description: "Greeting message"

runs:
 using: "composite"

 steps:
  - name: Create Greeting
    run: echo "message=Hello, ${{ inputs.username }}!" >> $GITHUB_OUTPUT
    shell: bash